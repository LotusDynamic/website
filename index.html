<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4a90e2, #50e3c2);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        h1 {
            margin-bottom: 0.5rem;
            font-size: 3rem;
        }
        p {
            margin: 0;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, World!</h1>
        <p>Welcome to your new website. This is a simple HTML starter page.</p>
    </div>
</body>
</html>
